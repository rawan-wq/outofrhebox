<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coming Soon</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
}

.page {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: #000;
  overflow: hidden;
}

/* النص الأوسط */
.content {
  position: absolute;
  left: 50%;
  top: 50%;
  width: min(560px, 78vw);
  transform: translate(-50%, -50%);
  z-index: 20;
  text-align: left;
  animation: contentFade 1.1s ease-out both;
}

.title {
  font-size: clamp(54px, 7.8vw, 96px);
  line-height: 0.9;
  font-weight: 300;
  letter-spacing: 2px;
  margin-bottom: 28px;
  color: #fff;
}

.subtitle {
  font-size: clamp(17px, 2vw, 25px);
  color: rgba(255, 255, 255, 0.9);
}

/* الشعار الأصلي */
.brand-logo {
  position: absolute;
  left: 18%;
  bottom: 11%;
  width: 190px;
  height: auto;
  z-index: 20;
  animation: logoFade 1.2s ease-out both;
}

/* الأشكال الأصلية كصور SVG */
.shape {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--size);
  height: auto;
  z-index: 5;
  opacity: 0;
  object-fit: contain;
  transform: translate(-50%, -50%) translate(0, 0) scale(0.15);
  animation:
    burstOut 2.1s cubic-bezier(.18, .92, .22, 1) forwards,
    softFloat 4.8s ease-in-out infinite;
  animation-delay:
    var(--delay),
    calc(var(--delay) + 2.1s);
}

/* حركة الخروج من منتصف الجملة */
@keyframes burstOut {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) translate(0, 0) scale(0.15);
  }

  20% {
    opacity: 1;
  }

  100% {
    opacity: 1;
    transform: translate(-50%, -50%) translate(var(--x), var(--y)) scale(1);
  }
}

/* حركة طفو بسيطة بعد الوصول */
@keyframes softFloat {
  0%, 100% {
    transform: translate(-50%, -50%) translate(var(--x), var(--y)) translate(0, 0) scale(1);
  }

  50% {
    transform: translate(-50%, -50%) translate(var(--x), var(--y)) translate(var(--mx), var(--my)) scale(1);
  }
}

@keyframes contentFade {
  from {
    opacity: 0;
    transform: translate(-50%, -47%);
  }

  to {
    opacity: 1;
    transform: translate(-50%, -50%);
  }
}

@keyframes logoFade {
  from {
    opacity: 0;
    transform: translateY(14px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* أماكن الأشكال */
.shape-1 {
  --size: 32px;
  --x: -360px;
  --y: -140px;
  --mx: -8px;
  --my: 6px;
  --delay: 0.10s;
}

.shape-2 {
  --size: 90px;
  --x: -150px;
  --y: -220px;
  --mx: 7px;
  --my: -8px;
  --delay: 0.18s;
}

.shape-3 {
  --size: 68px;
  --x: 280px;
  --y: -120px;
  --mx: 8px;
  --my: -10px;
  --delay: 0.26s;
}

.shape-4 {
  --size: 30px;
  --x: 370px;
  --y: 95px;
  --mx: 8px;
  --my: 4px;
  --delay: 0.34s;
}

.shape-5 {
  --size: 78px;
  --x: -330px;
  --y: 230px;
  --mx: -9px;
  --my: 8px;
  --delay: 0.42s;
}

.shape-6 {
  --size: 78px;
  --x: 300px;
  --y: 330px;
  --mx: -7px;
  --my: 8px;
  --delay: 0.50s;
}

/* نقاط بيضاء بسيطة مثل التصميم */
.white-dot {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 14px rgba(255, 255, 255, 0.75);
  z-index: 5;
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.15);
  animation:
    burstOut 2.1s cubic-bezier(.18, .92, .22, 1) forwards,
    softFloat 4.8s ease-in-out infinite;
  animation-delay:
    var(--delay),
    calc(var(--delay) + 2.1s);
}

.dot-1 {
  --x: 10px;
  --y: -360px;
  --mx: 0px;
  --my: -8px;
  --delay: 0.58s;
}

.dot-2 {
  --x: 210px;
  --y: 520px;
  --mx: 0px;
  --my: 8px;
  --delay: 0.66s;
}

/* الجوال */
@media (max-width: 700px) {
  .content {
    width: 74vw;
  }

  .brand-logo {
    left: 15%;
    bottom: 9%;
    width: 150px;
  }

  .shape-1 { --size: 26px; --x: -37vw; --y: -10vh; }
  .shape-2 { --size: 72px; --x: -16vw; --y: -22vh; }
  .shape-3 { --size: 54px; --x: 30vw; --y: -14vh; }
  .shape-4 { --size: 24px; --x: 34vw; --y: 8vh; }
  .shape-5 { --size: 62px; --x: -34vw; --y: 18vh; }
  .shape-6 { --size: 62px; --x: 28vw; --y: 25vh; }

  .dot-1 { --x: 1vw; --y: -36vh; }
  .dot-2 { --x: 22vw; --y: 38vh; }
}
</style>
</head>

<body>

<div class="page">

  <!-- الأشكال الأصلية -->
  <img class="shape shape-1" src="shape-1.svg" alt="" />
  <img class="shape shape-2" src="shape-2.svg" alt="" />
  <img class="shape shape-3" src="shape-3.svg" alt="" />
  <img class="shape shape-4" src="shape-4.svg" alt="" />
  <img class="shape shape-5" src="shape-5.svg" alt="" />
  <img class="shape shape-6" src="shape-6.svg" alt="" />

  <!-- نقاط بيضاء -->
  <div class="white-dot dot-1"></div>
  <div class="white-dot dot-2"></div>

  <!-- النص -->
  <main class="content">
    <h1 class="title">COMING<br>SOON...</h1>
    <p class="subtitle">Our new website is launching soon.</p>
  </main>

  <!-- الشعار -->
  <img class="brand-logo" src="logo.svg" alt="Out of the Box Logo" />

</div>

</body>
</html>
