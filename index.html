<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coming Soon</title>

<style>
@font-face {
  font-family: 'DINNextArabic';
  src: url('ArbFONTS-DINNextLTArabic-Regular-4.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: 'DINNextArabic', Arial, Helvetica, sans-serif;
  color: #fff;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Mobile / vertical version */
.stage {
  position: relative;
  width: min(100vw, 56.25vh);
  height: min(100vh, 177.78vw);
  aspect-ratio: 9 / 16;
  background: #000;
  overflow: hidden;
  container-type: size;
}

/* Main text */
.content {
  --cx: 0;
  position: absolute;
  left: 24.5%;
  top: 50.5%;
  width: 62%;
  transform: translate(var(--cx), -50%);
  z-index: 20;
  text-align: left;
  animation: contentFade 1s ease-out both;
}

.title {
  font-family: 'DINNextArabic', Arial, Helvetica, sans-serif;
  font-size: clamp(40px, 10.3cqw, 96px);
  line-height: 0.92;
  font-weight: 400;
  letter-spacing: 1.5px;
  margin-bottom: 2.6cqw;
  color: #fff;
}

.subtitle {
  font-family: 'DINNextArabic', Arial, Helvetica, sans-serif;
  font-size: clamp(14px, 2.55cqw, 24px);
  font-weight: 400;
  color: rgba(255, 255, 255, 0.9);
  white-space: nowrap;
}

/* Logo */
.brand-logo {
  position: absolute;
  left: 25.8%;
  bottom: 12.3%;
  width: 21.5%;
  height: auto;
  z-index: 20;
  animation: logoFade 1.2s ease-out both;
}

/* Colored assets */
.shape {
  position: absolute;
  left: 50%;
  top: 50.5%;
  width: var(--size);
  height: auto;
  z-index: 5;
  opacity: 0;
  object-fit: contain;
  image-rendering: auto;

  animation:
    burstOut 2s cubic-bezier(.18, .92, .22, 1) forwards,
    softFloat 5s ease-in-out infinite;

  animation-delay:
    var(--delay),
    calc(var(--delay) + 2s);
}

/* Assets move from center to outside */
@keyframes burstOut {
  0% {
    opacity: 0;
    left: 50%;
    top: 50.5%;
    transform: translate(-50%, -50%) scale(0.18);
  }

  20% {
    opacity: 1;
  }

  100% {
    opacity: 1;
    left: var(--left);
    top: var(--top);
    transform: translate(-50%, -50%) scale(1);
  }
}

/* Soft floating after arrival */
@keyframes softFloat {
  0%, 100% {
    left: var(--left);
    top: var(--top);
    transform: translate(-50%, -50%) translate(0, 0) scale(1);
  }

  50% {
    left: var(--left);
    top: var(--top);
    transform: translate(-50%, -50%) translate(var(--mx), var(--my)) scale(1);
  }
}

@keyframes contentFade {
  from {
    opacity: 0;
    transform: translate(var(--cx), -46%);
  }

  to {
    opacity: 1;
    transform: translate(var(--cx), -50%);
  }
}

@keyframes logoFade {
  from {
    opacity: 0;
    transform: translateY(14px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Desktop full-width version */

  }

  }

  .brand-logo {

/* Very small phones */

  }

  }

    width: 23%;
