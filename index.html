<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coming Soon</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: #000;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
}

.page {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: #000;
  overflow: hidden;
}

/* النص */
.content {
  position: absolute;
  left: 50%;
  top: 50%;
  width: min(560px, 80vw);
  transform: translate(-50%, -50%);
  z-index: 20;
  text-align: left;
}

h1 {
  font-size: clamp(56px, 8vw, 98px);
  line-height: 0.9;
  font-weight: 300;
  letter-spacing: 2px;
  margin-bottom: 28px;
}

p {
  font-size: clamp(17px, 2.1vw, 25px);
  color: rgba(255,255,255,0.9);
}

/* شعار الأسفل */
.brand {
  position: absolute;
  left: 18%;
  bottom: 11%;
  z-index: 20;
  color: #fff;
  font-size: clamp(22px, 3vw, 38px);
  line-height: 0.95;
  letter-spacing: 1px;
  font-weight: 300;
}

.diamond-logo {
  display: inline-block;
  width: 0.85em;
  height: 0.85em;
  border: 2px solid #fff;
  transform: rotate(45deg);
  margin: 0 0.12em;
}

/* كل عنصر يبدأ من منتصف الجملة ثم يطلع لمكانه */
.shape {
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 5;
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.2);
  animation:
    burst 2.2s cubic-bezier(.18,.9,.24,1) forwards,
    float 4.5s ease-in-out infinite;
  animation-delay:
    var(--delay),
    calc(var(--delay) + 2.2s);
}

@keyframes burst {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) translate(0, 0) scale(0.2);
  }

  18% {
    opacity: 1;
  }

  100% {
    opacity: 1;
    transform: translate(-50%, -50%) translate(var(--x), var(--y)) scale(1);
  }
}

@keyframes float {
  0%, 100% {
    transform: translate(-50%, -50%) translate(var(--x), var(--y)) translate(0, 0) scale(1);
  }

  50% {
    transform: translate(-50%, -50%) translate(var(--x), var(--y)) translate(var(--move-x), var(--move-y)) scale(1);
  }
}

/* نقطة بيضاء */
.white-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 14px rgba(255,255,255,0.7);
}

/* مربع أزرق */
.cyan-square {
  width: 30px;
  height: 30px;
  background: linear-gradient(135deg, #9effff, #30dbe4, #ffffff);
  box-shadow: 0 0 18px rgba(69, 236, 255, 0.45);
}

/* مربع صغير وردي/أصفر */
.hot-square {
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, #ff2670, #ff8b4b, #ffe04f);
  box-shadow: 0 0 18px rgba(255, 97, 86, 0.45);
}

/* شكل الأربع دوائر */
.four-dots {
  width: 90px;
  height: 90px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.four-dots span {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff7f7 0%, #ffc7e4 20%, #ffbd3d 65%, #ff9f00 100%);
  box-shadow: 0 0 14px rgba(255, 174, 54, 0.55);
}

/* شكل القطرة */
.drop {
  width: 62px;
  height: 62px;
  border-radius: 50% 50% 50% 7px;
  background: linear-gradient(180deg, #ff236d 0%, #ff5a7c 35%, #ffb33f 75%, #fff0b8 100%);
  box-shadow: 0 0 24px rgba(255, 65, 130, 0.45);
}

/* مجسم صغير */
.cube {
  width: 70px;
  height: 76px;
  clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  background: linear-gradient(145deg, #ffffff 0%, #60ecff 32%, #f3fbff 48%, #ffe92f 78%, #fff 100%);
  box-shadow: 0 0 24px rgba(120, 255, 247, 0.42);
}

.cube::after {
  content: "";
  position: absolute;
  right: 10px;
  bottom: 13px;
  width: 24px;
  height: 28px;
  background: #000;
  transform: skewY(-27deg);
}

/* معين ملون */
.diamond {
  width: 55px;
  height: 55px;
  background: linear-gradient(135deg, #4ff7ef 0%, #34cfff 35%, #596fff 65%, #e66eff 100%);
  transform: rotate(45deg);
  box-shadow: 0 0 22px rgba(75, 220, 255, 0.45);
}

/* زهرة */
.flower {
  width: 74px;
  height: 74px;
}

.flower span {
  position: absolute;
  width: 34px;
  height: 34px;
  border-radius: 100% 8% 100% 8%;
  background: radial-gradient(circle at 30% 30%, #fff 0%, #ffd6ec 25%, #ffbd4d 70%, #ff9900 100%);
  box-shadow: 0 0 12px rgba(255, 188, 80, 0.45);
}

.flower span:nth-child(1) {
  left: 20px;
  top: 0;
  transform: rotate(45deg);
}

.flower span:nth-child(2) {
  right: 0;
  top: 20px;
  transform: rotate(135deg);
}

.flower span:nth-child(3) {
  left: 20px;
  bottom: 0;
  transform: rotate(225deg);
}

.flower span:nth-child(4) {
  left: 0;
  top: 20px;
  transform: rotate(315deg);
}

/* أماكن العناصر حول النص */
.item-1 {
  --x: -360px;
  --y: -140px;
  --move-x: -8px;
  --move-y: 6px;
  --delay: 0.1s;
}

.item-2 {
  --x: -150px;
  --y: -220px;
  --move-x: 7px;
  --move-y: -8px;
  --delay: 0.18s;
}

.item-3 {
  --x: 280px;
  --y: -120px;
  --move-x: 8px;
  --move-y: -10px;
  --delay: 0.26s;
}

.item-4 {
  --x: 370px;
  --y: 95px;
  --move-x: 8px;
  --move-y: 4px;
  --delay: 0.34s;
}

.item-5 {
  --x: -330px;
  --y: 230px;
  --move-x: -9px;
  --move-y: 8px;
  --delay: 0.42s;
}

.item-6 {
  --x: -75px;
  --y: 330px;
  --move-x: 8px;
  --move-y: -7px;
  --delay: 0.5s;
}

.item-7 {
  --x: 300px;
  --y: 330px;
  --move-x: -7px;
  --move-y: 8px;
  --delay: 0.58s;
}

.item-8 {
  --x: 210px;
  --y: 520px;
  --move-x: 0px;
  --move-y: 8px;
  --delay: 0.66s;
}

.item-9 {
  --x: 10px;
  --y: -360px;
  --move-x: 0px;
  --move-y: -8px;
  --delay: 0.74s;
}

/* للجوال */
@media (max-width: 700px) {
  .content {
    width: 72vw;
  }

  .brand {
    left: 15%;
    bottom: 9%;
  }

  .item-1 { --x: -37vw; --y: -10vh; }
  .item-2 { --x: -16vw; --y: -22vh; }
  .item-3 { --x: 30vw; --y: -14vh; }
  .item-4 { --x: 34vw; --y: 8vh; }
  .item-5 { --x: -34vw; --y: 18vh; }
  .item-6 { --x: -8vw; --y: 25vh; }
  .item-7 { --x: 28vw; --y: 25vh; }
  .item-8 { --x: 22vw; --y: 38vh; }
  .item-9 { --x: 1vw; --y: -36vh; }

  .four-dots,
  .flower,
  .cube {
    scale: 0.75;
  }

  .drop,
  .diamond {
    scale: 0.8;
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="shape cyan-square item-1"></div>

  <div class="shape four-dots item-2">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="shape drop item-3"></div>

  <div class="shape hot-square item-4"></div>

  <div class="shape cube item-5"></div>

  <div class="shape diamond item-6"></div>

  <div class="shape flower item-7">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="shape white-dot item-8"></div>

  <div class="shape white-dot item-9"></div>

  <main class="content">
    <h1>COOMING<br>SOON...</h1>
    <p>Our new website is launching soon.</p>
  </main>

  <div class="brand">
    <div>OUT OF</div>
    <div>THE B<span class="diamond-logo"></span>X</div>
  </div>

</div>

</body>
</html>
