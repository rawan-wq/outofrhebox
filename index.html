<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coming Soon</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* مساحة التصميم الطولية */
.stage {
  position: relative;
  width: min(100vw, calc(100vh * 0.5625));
  height: min(100vh, calc(100vw * 1.7777));
  background: #000;
  overflow: hidden;
}

/* النص */
.content {
  position: absolute;
  left: 50%;
  top: 47%;
  width: 58%;
  transform: translate(-50%, -50%);
  z-index: 20;
  text-align: left;
  animation: contentFade 1s ease-out both;
}

.title {
  font-size: clamp(44px, 7vh, 88px);
  line-height: 0.9;
  font-weight: 300;
  letter-spacing: 1.5px;
  margin-bottom: 24px;
  color: #fff;
}

.subtitle {
  font-size: clamp(15px, 2.1vh, 23px);
  color: rgba(255, 255, 255, 0.9);
}

/* الشعار الأصلي */
.brand-logo {
  position: absolute;
  left: 23%;
  bottom: 12%;
  width: 22%;
  height: auto;
  z-index: 20;
  animation: logoFade 1.2s ease-out both;
}

/* الأشكال الأصلية */
.shape {
  position: absolute;
  left: 50%;
  top: 47%;
  width: var(--size);
  height: auto;
  z-index: 5;
  opacity: 0;
  object-fit: contain;

  transform: translate(-50%, -50%) translate(0, 0) scale(0.2);

  animation:
    burstOut 2s cubic-bezier(.18, .92, .22, 1) forwards,
    softFloat 5s ease-in-out infinite;

  animation-delay:
    var(--delay),
    calc(var(--delay) + 2s);
}

@keyframes burstOut {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) translate(0, 0) scale(0.2);
  }

  20% {
    opacity: 1;
  }

  100% {
    opacity: 1;
    transform: translate(-50%, -50%) translate(var(--x), var(--y)) scale(1);
  }
}

@keyframes softFloat {
  0%, 100% {
    transform: translate(-50%, -50%) translate(var(--x), var(--y)) translate(0, 0) scale(1);
  }

  50% {
    transform: translate(-50%, -50%) translate(var(--x), var(--y)) translate(var(--mx), var(--my)) scale(1);
  }
}

@keyframes contentFade {
  from {
    opacity: 0;
    transform: translate(-50%, -47%);
  }

  to {
    opacity: 1;
    transform: translate(-50%, -50%);
  }
}

@keyframes logoFade {
  from {
    opacity: 0;
    transform: translateY(14px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* أماكن الأشكال */
.shape-1 {
  --size: 4%;
  --x: -38vw;
  --y: -10vh;
  --mx: -5px;
  --my: 5px;
  --delay: 0.1s;
}

.shape-2 {
  --size: 10%;
  --x: -16vw;
  --y: -20vh;
  --mx: 6px;
  --my: -7px;
  --delay: 0.18s;
}

.shape-3 {
  --size: 7%;
  --x: 23vw;
  --y: -12vh;
  --mx: 6px;
  --my: -8px;
  --delay: 0.26s;
}

.shape-4 {
  --size: 4%;
  --x: 30vw;
  --y: 7vh;
  --mx: 5px;
  --my: 4px;
  --delay: 0.34s;
}

.shape-5 {
  --size: 8%;
  --x: -30vw;
  --y: 20vh;
  --mx: -7px;
  --my: 7px;
  --delay: 0.42s;
}

.shape-6 {
  --size: 8%;
  --x: 25vw;
  --y: 27vh;
  --mx: -6px;
  --my: 7px;
  --delay: 0.5s;
}

/* النقاط البيضاء */
.white-dot {
  position: absolute;
  left: 50%;
  top: 47%;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 12px rgba(255, 255, 255, 0.7);
  z-index: 5;
  opacity: 0;

  animation:
    dotBurst 2s cubic-bezier(.18, .92, .22, 1) forwards,
    dotFloat 5s ease-in-out infinite;

  animation-delay:
    var(--delay),
    calc(var(--delay) + 2s);
}

@keyframes dotBurst {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) translate(0, 0) scale(0.2);
  }

  20% {
    opacity: 1;
  }

  100% {
    opacity: 1;
    transform: translate(-50%, -50%) translate(var(--x), var(--y)) scale(1);
  }
}

@keyframes dotFloat {
  0%, 100% {
    transform: translate(-50%, -50%) translate(var(--x), var(--y));
  }

  50% {
    transform: translate(-50%, -50%) translate(var(--x), var(--y)) translate(0, var(--my));
  }
}

.dot-1 {
  --x: 0vw;
  --y: -34vh;
  --my: -6px;
  --delay: 0.58s;
}

.dot-2 {
  --x: 22vw;
  --y: 38vh;
  --my: 6px;
  --delay: 0.66s;
}

/* للجوال */
@media (max-width: 700px) {
  .title {
    font-size: clamp(42px, 8vh, 78px);
  }

  .subtitle {
    font-size: 16px;
  }

  .brand-logo {
    width: 24%;
  }
}
</style>
</head>

<body>

<div class="stage">

  <img class="shape shape-1" src="shape-1.svg" alt="" />
  <img class="shape shape-2" src="shape-2.svg" alt="" />
  <img class="shape shape-3" src="shape-3.svg" alt="" />
  <img class="shape shape-4" src="shape-4.svg" alt="" />
  <img class="shape shape-5" src="shape-5.svg" alt="" />
  <img class="shape shape-6" src="shape-6.svg" alt="" />

  <div class="white-dot dot-1"></div>
  <div class="white-dot dot-2"></div>

  <main class="content">
    <h1 class="title">COMING<br>SOON...</h1>
    <p class="subtitle">Our new website is launching soon.</p>
  </main>

  <img class="brand-logo" src="logo.svg" alt="Out of the Box Logo" />

</div>

</body>
</html>
