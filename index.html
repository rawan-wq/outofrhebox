<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coming Soon</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* نفس نسبة التصميم الأصلي 896 × 1600 */
.stage {
  position: relative;
  width: min(100vw, 56vh);
  height: min(100vh, 177.78vw);
  aspect-ratio: 896 / 1600;
  background: #000;
  overflow: hidden;
}

/* النص الأوسط */
.content {
  position: absolute;
  left: 24.5%;
  top: 50.5%;
  width: 58%;
  transform: translateY(-50%);
  z-index: 20;
  text-align: left;
  animation: contentFade 1s ease-out both;
}

.title {
  font-size: clamp(42px, 5.8vh, 92px);
  line-height: 0.92;
  font-weight: 300;
  letter-spacing: 1.5px;
  margin-bottom: 24px;
  color: #fff;
}

.subtitle {
  font-size: clamp(15px, 1.85vh, 28px);
  color: rgba(255, 255, 255, 0.9);
  white-space: nowrap;
}

/* الشعار كما هو */
.brand-logo {
  position: absolute;
  left: 26%;
  bottom: 12.3%;
  width: 22%;
  height: auto;
  z-index: 20;
  animation: logoFade 1.2s ease-out both;
}

/* العناصر الملونة */
.shape {
  position: absolute;
  left: 50%;
  top: 50.5%;
  width: var(--size);
  height: auto;
  z-index: 5;
  opacity: 0;
  object-fit: contain;

  animation:
    burstOut 2s cubic-bezier(.18, .92, .22, 1) forwards,
    softFloat 5s ease-in-out infinite;

  animation-delay:
    var(--delay),
    calc(var(--delay) + 2s);
}

/* تبدأ من منتصف الجملة وتخرج لمكانها */
@keyframes burstOut {
  0% {
    opacity: 0;
    left: 50%;
    top: 50.5%;
    transform: translate(-50%, -50%) scale(0.18);
  }

  20% {
    opacity: 1;
  }

  100% {
    opacity: 1;
    left: var(--left);
    top: var(--top);
    transform: translate(-50%, -50%) scale(1);
  }
}

/* حركة طفو بعد الوصول */
@keyframes softFloat {
  0%, 100% {
    left: var(--left);
    top: var(--top);
    transform: translate(-50%, -50%) translate(0, 0) scale(1);
  }

  50% {
    left: var(--left);
    top: var(--top);
    transform: translate(-50%, -50%) translate(var(--mx), var(--my)) scale(1);
  }
}

@keyframes contentFade {
  from {
    opacity: 0;
    transform: translateY(-46%);
  }

  to {
    opacity: 1;
    transform: translateY(-50%);
  }
}

@keyframes logoFade {
  from {
    opacity: 0;
    transform: translateY(14px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 
  توزيع العناصر حسب التصميم:
  Asset15 = المعين الأزرق
  Asset16 = القطرة الوردية
  Asset17 = الأربع دوائر
  Asset18 = المكعب
  Asset19 = الزهرة
  Asset20 = المربع الوردي/الأصفر
  Asset21 = المربع السماوي
  Asset22 = النقطة البيضاء العلوية
  Asset23 = النقطة البيضاء السفلية
*/

.asset-21 {
  --size: 3.2%;
  --left: 10.8%;
  --top: 38.7%;
  --mx: -5px;
  --my: 5px;
  --delay: 0.10s;
}

.asset-17 {
  --size: 7.5%;
  --left: 30.5%;
  --top: 35.2%;
  --mx: 6px;
  --my: -7px;
  --delay: 0.18s;
}

.asset-16 {
  --size: 6.4%;
  --left: 75.8%;
  --top: 41.5%;
  --mx: 7px;
  --my: -8px;
  --delay: 0.26s;
}

.asset-20 {
  --size: 2.8%;
  --left: 82.3%;
  --top: 52%;
  --mx: 5px;
  --my: 4px;
  --delay: 0.34s;
}

.asset-18 {
  --size: 8.2%;
  --left: 16.3%;
  --top: 60%;
  --mx: -7px;
  --my: 7px;
  --delay: 0.42s;
}

.asset-15 {
  --size: 7%;
  --left: 38.4%;
  --top: 67.2%;
  --mx: 7px;
  --my: -6px;
  --delay: 0.50s;
}

.asset-19 {
  --size: 7.5%;
  --left: 78.5%;
  --top: 67.4%;
  --mx: -6px;
  --my: 7px;
  --delay: 0.58s;
}

.asset-22 {
  --size: 1.4%;
  --left: 45.9%;
  --top: 22.4%;
  --mx: 0px;
  --my: -6px;
  --delay: 0.66s;
}

.asset-23 {
  --size: 1.4%;
  --left: 73.1%;
  --top: 77.7%;
  --mx: 0px;
  --my: 6px;
  --delay: 0.74s;
}

/* للجوال */
@media (max-width: 700px) {
  .title {
    font-size: clamp(40px, 5.6vh, 76px);
  }

  .subtitle {
    font-size: 15px;
  }

  .brand-logo {
    width: 23%;
  }
}
</style>
</head>

<body>

<div class="stage">

  <img class="shape asset-21" src="Asset21.svg" alt="" />
  <img class="shape asset-17" src="Asset17.svg" alt="" />
  <img class="shape asset-16" src="Asset16.svg" alt="" />
  <img class="shape asset-20" src="Asset20.svg" alt="" />
  <img class="shape asset-18" src="Asset18.svg" alt="" />
  <img class="shape asset-15" src="Asset15.svg" alt="" />
  <img class="shape asset-19" src="Asset19.svg" alt="" />
  <img class="shape asset-22" src="Asset22.svg" alt="" />
  <img class="shape asset-23" src="Asset23.svg" alt="" />

  <main class="content">
    <h1 class="title">COMING<br>SOON...</h1>

</body>
</html>
